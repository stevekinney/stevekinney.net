     inkscape:window-x="0"
     inkscape:window-y="33"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg26" />
  <title
     id="title">Bucket policy evaluation</title>
  <desc
     id="desc">Diagram comparing IAM policies, bucket policies, and S3 Block Public Access, showing how a public read request is evaluated.</desc>
  <defs
     id="defs1">
    <marker
       id="arrow"
       markerWidth="8"
       markerHeight="8"
       refX="7"
       refY="4"
       orient="auto-start-reverse">
      <path
         d="M 0 0 L 8 4 L 0 8 z"
         fill="#1f2937"
         id="path1" />
    </marker>
    <style
       id="style1">
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .card { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 16; }
      .accent { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 16; }
      .warn { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; rx: 16; }
      .green { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 16; }
      .callout { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .line {
        stroke: #1f2937;
        stroke-width: 2.25;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        marker-end: url(#arrow);
      }
      .dashed { stroke-dasharray: 8 7; }
      text { font-family: Arial, sans-serif; fill: #0f172a; }
      .title { font-size: 32px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #334155; }
      .heading { font-size: 22px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .body { font-size: 16px; fill: #334155; }
      .small { font-size: 14px; fill: #475569; }
      .center { text-anchor: middle; }
    </style>
  </defs>
  <rect
     class="bg"
     width="1200"
     height="760"
     id="rect1" />
  <text
     x="60"
     y="64"
     class="title"
     id="text1">How public read access reaches an S3 object</text>
  <text
     x="60"
     y="96"
     class="subtitle"
     id="text2">Identity policies answer what a user can do. Bucket policies answer who can touch the bucket. Block Public Access can still override both.</text>
  <rect
     x="50"
     y="130"
     width="330"
     height="560"
     class="panel"
     id="rect2" />
  <text
     x="80"
     y="172"
     class="heading"
     id="text3">Identity side</text>
  <rect
     x="90"
     y="220"
     width="250"
     height="84"
     class="card"
     id="rect3" />
  <text
     x="97.769531"
     y="252.10449"
     class="label"
     id="text4">IAM user or role</text>
  <text
     x="98.302734"
     y="276.10449"
     class="small"
     id="text5">Carries attached IAM policies</text>
  <rect
     x="90"
     y="360"
     width="250"
     height="110"
     class="accent"
     id="rect5" />
  <text
     x="97.769531"
     y="391.88477"
     class="label"
     id="text6">IAM policy</text>
  <text
     x="97.828125"
     y="417.88477"
     class="body"
     id="text7">Badge on the identity</text>
  <text
     x="97.899414"
     y="441.88477"
     class="small"
     id="text8"><tspan
       sodipodi:role="line"
       id="tspan27"
       x="97.899414"
       y="441.88477">Used for admins, deploy bots,</tspan><tspan
       sodipodi:role="line"
       id="tspan28"
       x="97.899414"
       y="459.38477">Lambda roles</tspan></text>
  <path
     class="line"
     d="M 215 304 L 215 360"
     id="path8" />
  <rect
     x="430"
     y="130"
     width="340"
     height="560"
     class="panel"
     id="rect8" />
  <text
     x="460"
     y="172"
     class="heading"
     id="text9">Resource side</text>
  <rect
     x="470"
     y="220"
     width="260"
     height="84"
     class="card"
     id="rect9" />
  <text
     x="478.34961"
     y="252.10449"
     class="label"
     id="text10">S3 bucket</text>
  <text
     x="478.07715"
     y="276.10449"
     class="small"
     id="text11">my-frontend-app-assets</text>
  <rect
     x="470"
     y="360"
     width="260"
     height="110"
     class="accent"
     id="rect11" />
  <text
     x="477.68164"
     y="391.88477"
     class="label"
     id="text12">Bucket policy</text>
  <text
     x="478.28125"
     y="417.88477"
     class="body"
     id="text13">Sign on the door</text>
  <text
     x="477.91992"
     y="441.88477"
     class="small"
     id="text14">Principal &quot;*&quot; can read objects</text>
  <path
     class="line"
     d="M 600 304 L 600 360"
     id="path14" />
  <rect
     x="820"
     y="130"
     width="330"
     height="560"
     class="panel"
     id="rect14" />
  <text
     x="850"
     y="172"
     class="heading"
     id="text15">Guardrail and outcome</text>
  <rect
     x="860"
     y="220"
     width="250"
     height="110"
     class="warn"
     id="rect15" />
  <text
     x="985"
     y="256"
     class="label center"
     id="text16">Block Public Access</text>
  <text
     x="985"
     y="284"
     class="body center"
     id="text17">Account or bucket guardrail</text>
  <text
     x="985"
     y="308"
     class="small center"
     id="text18">Can block a public bucket policy</text>
  <rect
     x="860"
     y="400"
     width="250"
     height="90"
     class="green"
     id="rect18" />
  <text
     x="985"
     y="440"
     class="label center"
     id="text19">200 OK</text>
  <text
     x="985"
     y="466"
     class="body center"
     id="text20">Object can be downloaded</text>
  <rect
     x="860"
     y="540"
     width="250"
     height="90"
     class="warn"
     id="rect20" />
  <text
     x="985"
     y="580"
     class="label center"
     id="text21">403</text>
  <text
     x="985"
     y="606"
     class="body center"
     id="text22">Public access still blocked</text>
  <path
     class="line dashed"
     d="M 730 415 L 860 415"
     id="path22" />
  <path
     class="line dashed"
     d="m 985,350 v 50"
     id="path23"
     sodipodi:nodetypes="cc" />
  <path
     class="line dashed"
     d="m 985,350 h 155 v 235 h -30"
     id="path24"
     sodipodi:nodetypes="cccc" />
  <rect
     x="455"
     y="560"
     width="290"
     height="86"
     class="callout"
     id="rect24" />
  <text
     x="600"
     y="588"
     class="small"
     text-anchor="middle"
     id="text26"><tspan
       x="600"
       dy="0"
       id="tspan24">Public website setup works only when the</tspan><tspan
       x="600"
       dy="18"
       id="tspan25">bucket policy allows read access and</tspan><tspan
       x="600"
       dy="18"
       id="tspan26">Block Public Access no longer blocks it.</tspan></text>
</svg>
