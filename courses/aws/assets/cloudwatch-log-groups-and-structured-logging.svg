<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 1200 760"
   role="img"
   aria-labelledby="title desc"
   version="1.1"
   id="svg28"
   sodipodi:docname="cloudwatch-log-groups-and-structured-logging.svg"
   inkscape:version="1.4 (e7c3feb1, 2024-10-09)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview28"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="1.7968024"
     inkscape:cx="486.9762"
     inkscape:cy="368.43228"
     inkscape:window-width="1512"
     inkscape:window-height="893"
     inkscape:window-x="0"
     inkscape:window-y="33"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg28" />
  <title
     id="title">CloudWatch log groups and structured logging</title>
  <desc
     id="desc">Diagram showing a Lambda log group containing multiple log streams, a JSON log entry, and a CloudWatch Logs Insights query reading the structured fields.</desc>
  <defs
     id="defs1">
    <marker
       id="arrow"
       markerWidth="8"
       markerHeight="8"
       refX="7"
       refY="4"
       orient="auto-start-reverse">
      <path
         d="M 0 0 L 8 4 L 0 8 z"
         fill="#1f2937"
         id="path1" />
    </marker>
    <style
       id="style1">
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .group { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 16; }
      .stream { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 12; }
      .json { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 16; }
      .line {
        stroke: #1f2937;
        stroke-width: 2.25;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        marker-end: url(#arrow);
      }
      text { font-family: Arial, sans-serif; fill: #0f172a; }
      .title { font-size: 32px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #334155; }
      .heading { font-size: 24px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .body { font-size: 16px; fill: #334155; }
      .mono { font-size: 14px; fill: #0f172a; font-family: 'Courier New', monospace; }
      .mono-small { font-size: 13px; fill: #0f172a; font-family: 'Courier New', monospace; }
      .small { font-size: 14px; fill: #475569; }
    </style>
  </defs>
  <rect
     class="bg"
     width="1200"
     height="760"
     id="rect1" />
  <text
     x="60"
     y="64"
     class="title"
     id="text1">How CloudWatch turns raw logs into something queryable</text>
  <text
     x="60"
     y="96"
     class="subtitle"
     id="text2">One log group contains multiple streams. JSON log entries expose stable fields that Logs Insights can filter and aggregate.</text>
  <rect
     x="50"
     y="140"
     width="340"
     height="560"
     class="panel"
     id="rect2" />
  <text
     x="80"
     y="184"
     class="heading"
     id="text3">Log group</text>
  <rect
     x="90"
     y="220"
     width="280"
     height="420"
     class="group"
     id="rect3" />
  <text
     x="116"
     y="252"
     class="label"
     id="text4">/aws/lambda/</text>
  <text
     x="116"
     y="278"
     class="label"
     id="text5">my-frontend-app-api</text>
  <rect
     x="120"
     y="300"
     width="230"
     height="56"
     class="stream"
     id="rect5" />
  <text
     x="140"
     y="334"
     class="mono"
     id="text6">2026/03/18/[$LATEST]a1</text>
  <rect
     x="120"
     y="388"
     width="230"
     height="56"
     class="stream"
     id="rect6" />
  <text
     x="140"
     y="422"
     class="mono"
     id="text7">2026/03/18/[$LATEST]b2</text>
  <rect
     x="120"
     y="476"
     width="230"
     height="56"
     class="stream"
     id="rect7" />
  <text
     x="140"
     y="510"
     class="mono"
     id="text8">2026/03/18/[$LATEST]c3</text>
  <text
     x="110"
     y="586"
     class="small"
     id="text9"><tspan
       x="110"
       dy="0"
       id="tspan8">Each stream represents one</tspan><tspan
       x="110"
       dy="18"
       id="tspan9">execution environment.</tspan></text>
  <rect
     x="430"
     y="140"
     width="340"
     height="560"
     class="panel"
     id="rect9" />
  <text
     x="460"
     y="184"
     class="heading"
     id="text10">Structured log entry</text>
  <rect
     x="450"
     y="240"
     width="310"
     height="230"
     class="json"
     id="rect10" />
  <g
     id="g28"
     transform="translate(0,-20)">
    <text
       x="472"
       y="282"
       class="mono"
       id="text11">{</text>
    <text
       x="488"
       y="314"
       class="mono"
       id="text12">&quot;level&quot;: &quot;INFO&quot;,</text>
    <text
       x="488"
       y="346"
       class="mono"
       id="text13">&quot;message&quot;: &quot;Request completed&quot;,</text>
    <text
       x="488"
       y="378"
       class="mono"
       id="text14">&quot;requestId&quot;: &quot;abc-123&quot;,</text>
    <text
       x="488"
       y="410"
       class="mono"
       id="text15">&quot;duration&quot;: 42,</text>
    <text
       x="488"
       y="442"
       class="mono"
       id="text16">&quot;userId&quot;: &quot;user-123&quot;</text>
    <text
       x="472"
       y="474"
       class="mono"
       id="text17">}</text>
  </g>
  <text
     x="478"
     y="536"
     class="body"
     id="text19"><tspan
       x="478"
       dy="0"
       id="tspan17">Each field becomes searchable</tspan><tspan
       x="478"
       dy="22"
       id="tspan18">instead of hiding inside</tspan><tspan
       x="478"
       dy="22"
       id="tspan19">one long string.</tspan></text>
  <rect
     x="810"
     y="140"
     width="340"
     height="560"
     class="panel"
     id="rect19" />
  <text
     x="840"
     y="184"
     class="heading"
     id="text20">Logs Insights</text>
  <rect
     x="840"
     y="240"
     width="280"
     height="212"
     class="group"
     id="rect20" />
  <text
     x="864"
     y="282"
     class="mono-small"
     id="text21">fields @timestamp,</text>
  <text
     x="864"
     y="312"
     class="mono-small"
     id="text22">requestId, duration</text>
  <text
     x="864"
     y="344"
     class="mono-small"
     id="text23">| filter level = &quot;ERROR&quot;</text>
  <text
     x="864"
     y="376"
     class="mono-small"
     id="text24">| sort @timestamp desc</text>
  <text
     x="864"
     y="408"
     class="mono-small"
     id="text25">| limit 20</text>
  <text
     x="850"
     y="520"
     class="body"
     id="text27"><tspan
       x="850"
       dy="0"
       id="tspan25">The query can filter, sort,</tspan><tspan
       x="850"
       dy="22"
       id="tspan26">and aggregate by named</tspan><tspan
       x="850"
       dy="22"
       id="tspan27">JSON fields.</tspan></text>
  <path
     class="line"
     d="M 370 414 L 450 414"
     id="path27" />
  <path
     class="line"
     d="M 770 355 L 810 355"
     id="path28" />
</svg>
