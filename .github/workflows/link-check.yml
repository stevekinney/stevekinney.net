name: Link Check

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: Check External Links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --exclude-all-private
            --exclude 'stevekinney|frontendmasters|github\.com/stevekinney'
            --exclude-status-code 403
            --max-retries 2
            --format markdown
            '**/*.md'
          fail: false

      - name: Write summary
        if: always()
        run: |
          if [ -f lychee/out.md ]; then
            cat lychee/out.md >> "$GITHUB_STEP_SUMMARY"
          fi
